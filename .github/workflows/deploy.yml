name: Deploy to EC2

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd teamtodo
            git pull
            mkdir -p /home/ubuntu/teamtodo/public/uploads
            grep -q UPLOAD_DIR .env || echo "UPLOAD_DIR=/home/ubuntu/teamtodo/public/uploads" >> .env
            npx prisma db push --accept-data-loss
            npm run build
            pm2 restart teamtodo
